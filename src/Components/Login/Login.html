<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="./Login.css">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <form class="loginForm">
                    <h2 style="color: white;">Login</h2>
                    <p>Don't have an account? <a href="../Sign_Up/Sign_Up.html"><span>Sign Up</span></a></p>

                    <div class="formItem">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Email" required>
                    </div>
                    <div class="formItem">
                        <label for="Password">Password</label>
                        <input type="password" name="password" id="password" placeholder="Password" required>
                    </div>
                    <div class="formButtons">
                        <button type="submit" id="submitButton" class="btn btn-primary mb-2 mr-1 waves-effect waves-light">Login</button>
                        <button type="reset" id="resetButton" class="btn btn-danger mb-2 waves-effect waves-light">Reset</button>
                    </div>
                    <p>Forgot Password?</p>
                </form>
            </div>
        </div>
    </body>
</html>
