<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Navbar</title>
        <link rel="stylesheet" href="./Navbar.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <body>
        <div class="container">

            <nav class="navbar">
                <!-- Logo and Company Name in the same group -->
                <div class="nav__logo">
                    <h3>StayHealthy</h3>
                    <img src="../assets/medical-team.png" height="70px" alt="Medical Team">
                </div>

                <!-- Hamburger Menu w/ onClick event listener -->
                 <div class="nav__icon" onclick={handleClick()}>
                    <i class="fa fa-times fa fa-bars"></i>
                 </div>



                <!-- Individual Links in the same group -->
                <ul class="navbarItems">
                    <li class="link"><a href="../Login/Login.html">Login</a></li>
                    <li class="link"><a href="../Sign_Up/Sign_Up.html">Sign-Up</a></li>
                    <li class="link"><a href="#reviews">Reviews</a></li>
                    <li class="link"><a href="#appointments">Appointments</a></li>
                    <li class="link"><a href="#home">Home</a></li>
                </ul>
            </nav>

        </div>
        <script>
            function handleClick(){
                const navbarItems = document.querySelector(".navbarItems");
                const navIcon = document.querySelector(".nav__icon i");

                navbarItems.classList.toggle("active");


                if(navbarItems.classList.contains("active")){
                    navIcon.classList.remove("fa-bars");
                    navIcon.classList.add("fa-times");
                } else {
                    navIcon.classList.remove("fa-times");
                    navIcon.classList.add("fa-bars");
                }
            }
        </script>
    </body>
</html>
